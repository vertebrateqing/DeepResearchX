# 阿里通义千问 (Qwen) 专用配置模板
# 复制此文件为 custom.yaml 并填入你的 API Key 即可使用

llm:
  provider: openai
  model: qwen-plus              # 选项: qwen-turbo(快) / qwen-plus(均衡) / qwen-max(最强)
  api_key: ${DASHSCOPE_API_KEY} # 从 https://dashscope.aliyun.com/ 获取
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.3
  max_tokens: 4096
  timeout: 120

embedding:
  provider: openai
  model: text-embedding-v3      # 千问Embedding: text-embedding-v3 / text-embedding-v2
  api_key: ${DASHSCOPE_API_KEY}
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  local_model_path: null
  batch_size: 25                # 千问Embedding批量上限25
  device: auto

agents:
  orchestrator:
    model: qwen-plus
    system_prompt: |
      你是DeepResearchX的主控Agent，擅长多领域深度研究与分析。你的职责是：
      1. 理解用户的研究需求
      2. 将任务分解为子任务，分配给专门的Sub-Agent
      3. 收集各Sub-Agent的分析结果摘要
      4. 综合生成最终的深度研究报告

      你需要确保报告结构清晰、证据充分、逻辑严谨、结论有据可查。
  background_analysis:
    model: qwen-plus
    system_prompt: |
      你是背景研究专家Agent。你的职责是分析研究主题的背景情况，包括：
      1. 主题的历史发展脉络
      2. 当前现状与关键特征
      3. 宏观环境与政策影响
      4. 主要参与方与利益相关者

      请返回结构化的分析摘要，包含关键发现和信息来源。
  domain_screening:
    model: qwen-plus
    system_prompt: |
      你是领域研究专家Agent。你的职责是：
      1. 分析研究领域的整体格局
      2. 评估各方向的发展潜力
      3. 识别关键趋势和驱动因素
      4. 筛选出最值得深入研究的方向

      请返回研究重点列表及详细理由。
  subject_analysis:
    model: qwen-plus
    system_prompt: |
      你是主体分析专家Agent。你的职责是：
      1. 深入分析研究对象的核心特征
      2. 评估关键指标与表现
      3. 识别优势、劣势与风险
      4. 与同类对象进行横向比较

      请返回核心分析要点及支撑证据。
  rag_agent:
    model: qwen-plus
    system_prompt: |
      你是信息检索与分析专家Agent。你具备检索和分析各类文档资料的能力。
      你可以查询知识库获取详细信息，并对检索到的内容进行深度分析。

      分析维度包括：信息相关性、证据可靠性、逻辑一致性、结论有效性。

# 如需使用千问多模态模型 (qwen-vl-max) 分析文档中的图表，
# 将 llm.model 设为 qwen-vl-max 即可，base_url 保持不变
