# Docker Compose 配置文件
#
# 这个文件定义了如何同时启动多个 Docker 容器。
# 你只需要运行 `docker-compose up --build`，它就会：
# 1. 构建后端镜像并启动后端容器
# 2. 构建前端镜像并启动前端容器
# 3. 自动连接两个容器的网络

version: "3.8"

# services 定义要启动的容器
services:
  # 后端服务
  backend:
    # 构建配置
    build:
      context: ./backend      # 构建的上下文目录
      dockerfile: Dockerfile  # 使用的 Dockerfile
    # 容器名称（方便查看日志）
    container_name: a-stock-backend
    # 端口映射：主机 8000 → 容器 8000
    ports:
      - "8000:8000"
    # 挂载卷：开发时把本地代码映射到容器里，修改代码不用重建镜像
    volumes:
      - ./backend:/app
    # 环境变量
    environment:
      - PYTHONUNBUFFERED=1
    # 重启策略：除非手动停止，否则总是自动重启
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: a-stock-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # node_modules 不映射（避免容器内和本地的冲突）
      - /app/node_modules
    # 前端依赖后端，确保后端先启动
    depends_on:
      - backend
    restart: unless-stopped
