# A股分析Agent系统 - 默认配置
# 支持中国大模型: DeepSeek / Kimi / 通义千问 / 智谱AI / 文心一言 等
# 所有中国大模型均使用 OpenAI 兼容 API 格式，只需配置 base_url 和 api_key

# LLM配置
llm:
  # provider: 模型提供商类型
  #   - openai: 使用 OpenAI 兼容 API (包括所有中国大模型)
  #   - local: 使用本地部署的模型 (vLLM/Ollama等)
  provider: openai

  # model: 模型名称
  # OpenAI: gpt-4o, gpt-4o-mini, gpt-3.5-turbo
  # DeepSeek: deepseek-chat, deepseek-reasoner
  # Kimi (Moonshot): moonshot-v1-8k, moonshot-v1-32k, moonshot-v1-128k
  # 通义千问 (Aliyun DashScope): qwen-turbo, qwen-plus, qwen-max
  # 智谱AI (Zhipu): glm-4, glm-4-plus, glm-4-flash
  # 百度文心 (Qianfan): ernie-4.0, ernie-3.5
  model: qwen-plus

  api_key: ${OPENAI_API_KEY}

  # base_url: API 基础地址
  # OpenAI: https://api.openai.com/v1
  # DeepSeek: https://api.deepseek.com/v1
  # Kimi (Moonshot): https://api.moonshot.cn/v1
  # 通义千问 (DashScope): https://dashscope.aliyuncs.com/compatible-mode/v1
  # 智谱AI: https://open.bigmodel.cn/api/paas/v4
  # 百度千帆: https://qianfan.baidubce.com/v2
  # 本地模型 (vLLM/Ollama): http://localhost:8000/v1
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions

  # 以下为模型生成参数
  temperature: 0.3
  max_tokens: 4096
  timeout: 120

# Embedding配置
embedding:
  provider: local

  # Embedding模型名称 (仅 provider=openai 时生效)
  # OpenAI: text-embedding-3-large, text-embedding-3-small, text-embedding-ada-002
  # 智谱AI: embedding-3
  # 百度千帆: embedding-v1
  # 本地: BAAI/bge-large-zh-v1.5, BAAI/bge-m3, moka-ai/m3e-base
  model: text-embedding-v1

  api_key: ${OPENAI_API_KEY}

  # Embedding API base_url (provider=openai 时生效)
  # OpenAI: https://api.openai.com/v1/embeddings
  # 智谱AI: https://open.bigmodel.cn/api/paas/v4/embeddings
  # 百度千帆: https://qianfan.baidubce.com/v2/embeddings
  # 通义千问: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings

  # 请求超时(秒)。若在中国大陆访问OpenAI较慢，建议改小timeout以快速失败，或切换为国内API
  timeout: 30

  # 本地模型配置 (当 provider=local 时使用)
  local_model_path: BAAI/bge-large-zh-v1.5
  batch_size: 32
  device: auto  # auto / cpu / cuda

# VLM (视觉语言模型) 配置
vlm:
  enabled: false  # 默认关闭VLM图表理解，如需开启请改为 true

# RAG配置
rag:
  vector_db:
    path: ./financial_agent/data/vector_db
    collection_name: financial_reports
    distance_fn: cosine  # cosine / l2 / ip
  bm25:
    index_path: ./financial_agent/data/bm25_index
    k1: 1.5
    b: 0.75
  text_splitter:
    chunk_size: 512
    chunk_overlap: 64
    separators: ["\n\n", "\n", "。", "；", "，", " ", ""]
  retrieval:
    top_k_vector: 20
    top_k_bm25: 20
    top_k_final: 10
    rerank: true
    rerank_top_k: 5

# 数据源配置
data_sources:
  akshare:
    enabled: true
  web_search:
    provider: tavily  # tavily / duckduckgo
    api_key: ${TAVILY_API_KEY}
    max_results: 10

# Agent配置
# 注意: agents.*.model 可覆盖全局 llm.model
# 例如使用 DeepSeek 时，子Agent可用轻量模型，主Agent用推理模型
agents:
  orchestrator:
    model: qwen-plus
    system_prompt: |
      你是一位资深投资分析师。你的职责是基于研究团队提供的研究发现，综合生成一份完整、专业、结构化的分析报告。

      报告要求：
      1. 结构清晰，包含执行摘要、详细分析和结论
      2. 数据支撑充分，逻辑严谨
      3. 每个关键结论标注数据来源和置信度
      4. 承认信息缺口和不确定性
      5. 语言专业但易懂
  financial_rag:
    model: qwen-plus
    system_prompt: |
      你是财报分析专家Agent。你具备阅读和分析上市公司财报的能力。
      你可以查询财报数据库获取详细信息，并对财务数据进行深度分析。

      分析维度包括：盈利能力、偿债能力、运营效率、成长性、现金流质量。

# 输出配置
output:
  output_dir: ./financial_agent/data/output  # 报告输出目录

# 日志配置
logging:
  level: DEBUG  # 测试开发阶段打全日志，生产环境可改为 INFO
  format: console  # json / console，开发阶段用 console 更易读
  file: null  # 日志文件路径，null则只输出到控制台
